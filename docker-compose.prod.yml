version: '3.8'

services:
  app:
    image: takumifuruya/fam-diary-log-client:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.production.local  # JWT_SECRET など秘密情報は実行時に .env.production.local から渡す
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - fam-diary-network

networks:
  fam-diary-network:
    driver: bridge
